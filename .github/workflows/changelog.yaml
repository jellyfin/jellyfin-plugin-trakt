name: '📝 Create/Update Release Draft & Release Bump PR'

on:
  push:
    branches:
      - master
    paths-ignore:
      - build.yaml
  workflow_dispatch:
  repository_dispatch:
    types:
      - update-prep-command

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/changelog.yaml@b40eae0e963055a9981e8b076beee8ae1b1207ad # master
    with:
      repository-name: jellyfin/jellyfin-plugin-trakt
    secrets:
      token: ${{ secrets.JF_BOT_TOKEN }}
