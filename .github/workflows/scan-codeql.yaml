name: '🔬 Run CodeQL'

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
  schedule:
    - cron: '24 2 * * 4'
  workflow_dispatch:

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/scan-codeql.yaml@b40eae0e963055a9981e8b076beee8ae1b1207ad # master
    with:
      repository-name: jellyfin/jellyfin-plugin-trakt
