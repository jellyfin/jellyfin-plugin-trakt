name: '🔬 Run CodeQL'

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
  schedule:
    - cron: '24 2 * * 4'
  workflow_dispatch:

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/scan-codeql.yaml@672e46d3ec5096731edbb7581ca872f3d8175cf8 # master
    with:
      repository-name: jellyfin/jellyfin-plugin-trakt
